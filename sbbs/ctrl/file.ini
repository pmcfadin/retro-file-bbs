; CP/M Software Depot — Synchronet File Area Configuration
; Generated from config/file_areas.ini by sync_synchronet.py
; Can also be manually edited and will be preserved across restarts.

; Global file settings
min_dspace=100M
max_batdn=50

; === CP/M Software Library ===
[lib:CPM]
description=CP/M Software Archive
ars=
upload_ars=SYSOP
download_ars=
parent_path=/sbbs/xfer/cpm
code_prefix=CPM_
sort=0
settings=0

[dir_defaults:CPM]
settings=0x8c9
max_files=5000

[dir:CPM:ARCHIVE]
description=Archive and compression utilities (LBR, ARC, ZIP)
name=Archivers
ars=
path=archivers/
max_files=5000

[dir:CPM:COMM]
description=Modem and terminal programs, BYE, IMP, MEX, ZMODEM
name=Communications
ars=
path=comm/
max_files=5000

[dir:CPM:EDITORS]
description=Text editors and word processors
name=Editors
ars=
path=editors/
max_files=5000

[dir:CPM:FAQ]
description=Frequently asked questions and documentation
name=FAQ & Docs
ars=
path=faq/
max_files=5000

[dir:CPM:PRINTER]
description=Printer drivers and formatting utilities
name=Printer Utils
ars=
path=printer/
max_files=5000

[dir:CPM:PROD]
description=Productivity and business applications
name=Productivity
ars=
path=prod/
max_files=5000

[dir:CPM:PROG]
description=Compilers, assemblers, and development tools
name=Programming
ars=
path=programming/
max_files=5000

[dir:CPM:SYS]
description=System utilities, BIOS, and platform-specific tools
name=System Utils
ars=
path=sys/
max_files=5000

[dir:CPM:TEXTS]
description=Text file collections and references
name=Text Files
ars=
path=texts/
max_files=5000

[dir:CPM:XFER]
description=File transfer protocols and utilities
name=File Transfer
ars=
path=transfer/
max_files=5000

[dir:CPM:UNSORT]
description=Uncategorized files
name=Unsorted
ars=
path=unsorted/
max_files=5000

[dir:CPM:ZUTIL]
description=ZCPR and Z-System utilities
name=Z-System Utils
ars=
path=zutils/
max_files=5000
