services:
  cpmdepot:
    build: .
    container_name: cpmdepot
    ports:
      - "2323:2323"   # telnet
      - "8080:8080"   # HTTP mirror
    volumes:
      - ./cpm:/data/cpm:ro
      - index_data:/data
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped

volumes:
  index_data:
