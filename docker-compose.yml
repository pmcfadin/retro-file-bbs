services:
  cpmdepot:
    build: .
    container_name: cpmdepot
    ports:
      - "2323:2323"   # telnet
      - "8080:8080"   # HTTP mirror
    volumes:
      - ./cpm:/data/cpm:ro
      - index_data:/data
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped

  # Interactive CP/M terminal — connects to the BBS via Kermit
  # Usage: docker compose run --rm cpm
  cpm:
    build:
      context: .
      dockerfile: Dockerfile.test
    entrypoint: ["python3", "-m", "emulation.interactive", "--host", "cpmdepot", "--port", "2323"]
    working_dir: /app
    depends_on:
      - cpmdepot
    stdin_open: true
    tty: true
    profiles:
      - interactive

volumes:
  index_data:
